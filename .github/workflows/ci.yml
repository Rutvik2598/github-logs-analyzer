name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  analyze-failure:
    name: Analyze CI Failure
    runs-on: ubuntu-latest
    needs: [ci]
    if: failure()
    permissions:
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Analyze failure
        uses: ./
        with:
          provider: gemini
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
