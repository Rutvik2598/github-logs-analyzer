name: Test Action

on:
  push:
  pull_request:

jobs:
  # This job deliberately fails so the analyzer has something to work with
  failing-job:
    runs-on: ubuntu-latest
    steps:
      - name: This step will pass
        run: echo "All good so far"

      - name: This step will fail
        run: |
          echo "Simulating a test failure"
          exit 1

  analyze-failure:
    runs-on: ubuntu-latest
    needs: [failing-job]
    if: failure()
    permissions:
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Analyze failure
        uses: ./                                            # uses this repo's action.yml directly
        with:
          provider: gemini                                  # swap to anthropic / openai / groq as needed
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
